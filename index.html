<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マジックカードマウントに乗ろう！</title>
<style>
  :root {
    --bg:      #f5f2eb;
    --bg2:     #ede9df;
    --bg3:     #e4dfd3;
    --card:    #fdfcf8;
    --border:  #d6d0c2;
    --border2: #c0b89e;
    --gold:    #8a6a1a;
    --gold2:   #b58a2a;
    --text:    #2a2520;
    --text2:   #6b6050;
    --text3:   #a09880;
    --checked:        rgba(138,106,26,0.08);
    --checked-border: rgba(138,106,26,0.35);

    --c-npc:   #1a6b5a; --cb-npc:   rgba(26,107,90,0.1);
    --c-duty:  #2a4a9a; --cb-duty:  rgba(42,74,154,0.1);
    --c-gs:    #8a4a10; --cb-gs:    rgba(138,74,16,0.1);
    --c-ach:   #4a7a20; --cb-ach:   rgba(74,122,32,0.1);
    --c-fate:  #6a3a9a; --cb-fate:  rgba(106,58,154,0.1);
    --c-other: #5a5048; --cb-other: rgba(90,80,72,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ヘッダー */
  header {
    background: #4a3a1a;
    border-bottom: 2px solid #6a5228;
    padding: 0 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center;
    height: 52px; gap: 12px;
  }
  .logo { font-size: 17px; font-weight: 700; color: #e8d080; letter-spacing: 0.02em; white-space: nowrap; }
  .logo-sub { font-size: 12px; color: #c0a84a; font-weight: 400; margin-left: 10px; }

  /* サマリー */
  .summary { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px; }
  .summary-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; align-items: center; min-width: 48px; }
  .stat-num { font-size: 20px; font-weight: 700; line-height: 1.1; }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 1px; }
  .stat-num.owned   { color: var(--gold); }
  .stat-num.missing { color: var(--text2); }
  .progress-wrap { flex: 1; min-width: 140px; }
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 3px; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--text2); }
  .progress-label strong { color: var(--gold); }

  /* オーナーメモ */
  .owner-memo {
    flex: 0 0 auto; min-width: 200px; max-width: 320px;
    background: #fffef5;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.7;
  }
  .owner-memo-title { font-size: 10px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }

  /* URL共有 */
  .share-area { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 20px; }
  .share-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .share-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .share-url {
    flex: 1; min-width: 180px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 9px;
    color: var(--text2); font-size: 11px; font-family: monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btn {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 5px; color: var(--text); font-size: 11px;
    padding: 5px 12px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--border); }
  .btn.gold { border-color: var(--gold); color: var(--gold); }
  .btn.gold:hover { background: var(--checked); }
  .restore-input {
    flex: 1; min-width: 180px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 9px;
    color: var(--text); font-size: 11px; font-family: monospace;
  }
  .restore-input:focus { outline: none; border-color: var(--gold); }

  /* フィルター */
  .filters {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    position: sticky; top: 52px; z-index: 90;
  }
  .filters-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 3px 10px; border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text2);
    font-size: 11px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--checked); font-weight: 600; }
  .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
  .search-input {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 5px; padding: 3px 9px;
    color: var(--text); font-size: 11px; width: 150px;
  }
  .search-input:focus { outline: none; border-color: var(--gold); }
  .filter-label { font-size: 10px; color: var(--text3); white-space: nowrap; }

  /* メイン */
  main { max-width: 1100px; margin: 0 auto; padding: 14px 20px 60px; }

  /* グループヘッダー */
  .group { margin-bottom: 20px; }
  .group-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    position: sticky; top: 94px;
    background: var(--bg); z-index: 80;
  }
  .group-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .group-name { font-size: 12px; font-weight: 600; letter-spacing: 0.03em; }
  .group-owned { font-size: 11px; margin-left: auto; }

  /* カードリスト */
  .card-list { display: flex; flex-direction: column; gap: 1px; }
  .card-item {
    display: grid;
    grid-template-columns: 26px 30px 42px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: var(--card);
    transition: background 0.1s, border-color 0.1s;
  }
  .card-item:hover { background: var(--bg3); border-color: var(--border); }
  .card-item.checked { background: var(--checked); border-color: var(--checked-border); }
  .card-item.checked .card-name { color: var(--gold2); }
  .card-item.checked .card-no  { color: var(--gold); }

  /* チェックボックス */
  .card-check {
    width: 17px; height: 17px;
    border: 1.5px solid var(--border2); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; transition: all 0.1s;
  }
  .card-check:hover { border-color: var(--gold); }
  .card-item.checked .card-check { background: var(--gold); border-color: var(--gold); }
  .card-item.checked .card-check::after {
    content: '';
    display: block;
    width: 4px; height: 8px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px,-1px);
  }

  /* アイコン */
  .card-icon-wrap { width: 30px; height: 30px; flex-shrink: 0; }
  .card-icon-wrap img {
    width: 30px; height: 30px; border-radius: 3px; display: block;
    border: 1px solid var(--border);
  }
  .card-item.checked .card-icon-wrap img { border-color: var(--gold2); }

  /* テキスト */
  .card-no   { font-size: 10px; color: var(--text3); font-family: monospace; }
  .card-name { font-size: 12px; color: var(--text); font-weight: 500; }

  /* sourcesエリア */
  .card-sources {
    display: flex; flex-wrap: wrap; gap: 3px;
    justify-content: flex-end; align-items: center;
  }
  .src-badge {
    font-size: 10px; padding: 1px 6px;
    border-radius: 8px; white-space: nowrap;
    border: 1px solid transparent;
  }
  .src-type-label { font-size: 9px; font-weight: 700; margin-right: 1px; }

  /* badge color helpers */
  .src-npc   { background: var(--cb-npc);  color: var(--c-npc);  border-color: rgba(26,107,90,0.2); }
  .src-duty  { background: var(--cb-duty); color: var(--c-duty); border-color: rgba(42,74,154,0.2); }
  .src-gs    { background: var(--cb-gs);   color: var(--c-gs);   border-color: rgba(138,74,16,0.2); }
  .src-ach   { background: var(--cb-ach);  color: var(--c-ach);  border-color: rgba(74,122,32,0.2); }
  .src-fate  { background: var(--cb-fate); color: var(--c-fate); border-color: rgba(106,58,154,0.2); }
  .src-other { background: var(--cb-other);color: var(--c-other);border-color: rgba(90,80,72,0.2); }

  /* ★パッチ小表示 */
  .card-meta { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .card-stars { color: var(--gold2); }

  /* ローディング */
  #loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 14px; color: var(--text2);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { display: none; text-align: center; padding: 40px; color: var(--text2); }
  #app   { display: none; }

  /* トースト */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--gold); color: #fff;
    padding: 7px 18px; border-radius: 18px;
    font-size: 12px; font-weight: 600;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .card-item { grid-template-columns: 26px 30px 38px 1fr; }
    .card-sources { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      ♠ マジックカードマウントに乗ろう！
      <span class="logo-sub">「生粋のカードマニア」のアチーブメント支援</span>
    </div>
  </div>
</header>

<div class="summary">
  <div class="summary-inner">
    <div class="stat">
      <div class="stat-num owned" id="stat-owned">0</div>
      <div class="stat-label">所持</div>
    </div>
    <div class="stat">
      <div class="stat-num missing" id="stat-missing">312</div>
      <div class="stat-label">未所持</div>
    </div>
    <div class="stat">
      <div class="stat-num">312</div>
      <div class="stat-label">目標</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label">達成率 <strong id="progress-pct">0%</strong> — あと <strong id="progress-left">312</strong> 枚</div>
    </div>

    <!-- ▼▼▼ オーナーメモ（ここに5行のTIPSを書いてください） ▼▼▼ -->
    <div class="owner-memo">
      <div class="owner-memo-title">📝 TIPS</div>
      <div id="owner-memo-content">
        ・ここにTIPSを書いてください（1行目）<br>
        ・ここにTIPSを書いてください（2行目）<br>
        ・ここにTIPSを書いてください（3行目）<br>
        ・ここにTIPSを書いてください（4行目）<br>
        ・ここにTIPSを書いてください（5行目）
      </div>
    </div>
    <!-- ▲▲▲ オーナーメモここまで ▲▲▲ -->

  </div>
</div>

<div class="share-area">
  <div class="share-inner">
    <span class="share-label">📋 現在のURL</span>
    <div class="share-url" id="share-url">チェックするとURLが更新されます</div>
    <button class="btn gold" onclick="copyUrl()">URLをコピー</button>
    <div class="filter-sep"></div>
    <span class="share-label">🔗 URLで復元</span>
    <input class="restore-input" id="restore-input" type="text" placeholder="以前のURLを貼り付け...">
    <button class="btn" onclick="restoreFromInput()">復元</button>
  </div>
</div>

<div class="filters">
  <div class="filters-inner">
    <span class="filter-label">表示：</span>
    <button class="filter-btn" data-view="all"     onclick="setView(this,'all')">すべて</button>
    <button class="filter-btn active" data-view="missing" onclick="setView(this,'missing')">未所持のみ</button>
    <button class="filter-btn" data-view="owned"   onclick="setView(this,'owned')">所持済み</button>
    <div class="filter-sep"></div>
    <span class="filter-label">入手方法：</span>
    <button class="filter-btn" data-type="NPC"         onclick="toggleType(this,'NPC')">NPC対戦</button>
    <button class="filter-btn" data-type="Trial"       onclick="toggleType(this,'Trial')">討滅戦</button>
    <button class="filter-btn" data-type="Raid"        onclick="toggleType(this,'Raid')">レイド</button>
    <button class="filter-btn" data-type="Dungeon"     onclick="toggleType(this,'Dungeon')">ダンジョン</button>
    <button class="filter-btn" data-type="FATE"        onclick="toggleType(this,'FATE')">FATE</button>
    <button class="filter-btn" data-type="Gold Saucer" onclick="toggleType(this,'Gold Saucer')">ゴールドソーサー</button>
    <button class="filter-btn" data-type="Achievement" onclick="toggleType(this,'Achievement')">アチーブメント</button>
    <button class="filter-btn" data-type="Quest"       onclick="toggleType(this,'Quest')">クエスト</button>
    <button class="filter-btn" data-type="Hunts"       onclick="toggleType(this,'Hunts')">モブハント</button>
    <button class="filter-btn" data-type="Deep Dungeon" onclick="toggleType(this,'Deep Dungeon')">ディープダンジョン</button>
    <button class="filter-btn" data-type="Eureka"      onclick="toggleType(this,'Eureka')">エウレカ</button>
    <button class="filter-btn" data-type="Bozja"       onclick="toggleType(this,'Bozja')">ボズヤ</button>
    <button class="filter-btn" data-type="Skybuilders" onclick="toggleType(this,'Skybuilders')">蒼天街</button>
    <div class="filter-sep"></div>
    <input class="search-input" id="search" type="text" placeholder="カード名で検索..." oninput="renderCards()">
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div>カードデータを読み込み中...</div>
</div>
<div id="error">
  <p>データの読み込みに失敗しました。</p>
  <button class="btn" style="margin-top:16px;" onclick="location.reload()">再読み込み</button>
</div>

<main id="app"></main>
<div id="toast"></div>

<script>
// =====================
// 定数・状態
// =====================
const TOTAL = 312;
let allCards = [];
let owned = new Array(TOTAL + 1).fill(false);
let currentView = 'missing';
let activeTypes = new Set();

// =====================
// typeの日本語マッピング
// =====================
const TYPE_JA = {
  'NPC':          'NPC対戦',
  'Trial':        '討滅戦',
  'Raid':         'レイド',
  'Dungeon':      'ダンジョン',
  'FATE':         'FATE',
  'Gold Saucer':  'ゴールドソーサー',
  'Achievement':  'アチーブメント',
  'Quest':        'クエスト',
  'Hunts':        'モブハント',
  'Deep Dungeon': 'ディープダンジョン',
  'Eureka':       'エウレカ',
  'Bozja':        'ボズヤ',
  'Skybuilders':  '蒼天街',
};

// typeからバッジCSSクラス
function typeCls(type) {
  if (type === 'NPC') return 'src-npc';
  if (type === 'Trial' || type === 'Raid' || type === 'Dungeon') return 'src-duty';
  if (type === 'Gold Saucer') return 'src-gs';
  if (type === 'Achievement') return 'src-ach';
  if (type === 'FATE' || type === 'Eureka' || type === 'Bozja') return 'src-fate';
  return 'src-other';
}

// =====================
// グループ定義（表示順）
// =====================
const GROUPS = [
  { key: 'NPC',         label: 'NPC対戦',         color: '#1a6b5a', types: ['NPC'] },
  { key: 'Duty',        label: 'ID / 討滅戦 / レイド', color: '#2a4a9a', types: ['Trial','Raid','Dungeon'] },
  { key: 'Gold Saucer', label: 'ゴールドソーサー',   color: '#8a4a10', types: ['Gold Saucer'] },
  { key: 'Achievement', label: 'アチーブメント',     color: '#4a7a20', types: ['Achievement'] },
  { key: 'Field',       label: 'フィールド系',       color: '#6a3a9a', types: ['FATE','Eureka','Bozja','Hunts','Deep Dungeon','Skybuilders'] },
  { key: 'Quest',       label: 'クエスト',           color: '#7a5a20', types: ['Quest'] },
  { key: 'Other',       label: 'その他',             color: '#5a5048', types: [] },
];

function getGroupKey(card) {
  if (!card.sources || card.sources.length === 0) return 'Other';
  const types = card.sources.map(s => s.type);
  for (const g of GROUPS) {
    if (g.types.some(t => types.includes(t))) return g.key;
  }
  return 'Other';
}

// =====================
// URLハッシュ
// =====================
function hashFromOwned() {
  let bits = '';
  for (let i = 1; i <= TOTAL; i++) bits += owned[i] ? '1' : '0';
  return bits;
}
function ownedFromHash(hash) {
  owned = new Array(TOTAL + 1).fill(false);
  for (let i = 0; i < Math.min(hash.length, TOTAL); i++) {
    if (hash[i] === '1') owned[i + 1] = true;
  }
}
function updateUrl() {
  history.replaceState(null, '', '#' + hashFromOwned());
  document.getElementById('share-url').textContent = location.href;
}
function restoreFromInput() {
  const input = document.getElementById('restore-input').value.trim();
  let hash = input.includes('#') ? input.split('#')[1] : input;
  if (hash.length !== TOTAL || !/^[01]+$/.test(hash)) {
    showToast('URLが正しくありません'); return;
  }
  ownedFromHash(hash);
  updateUrl(); updateStats(); renderCards();
  showToast('所持状態を復元しました');
}

// =====================
// cards.json 読み込み
// =====================
async function fetchCards() {
  const res = await fetch('./cards.json');
  if (!res.ok) throw new Error('cards.json load error');
  const data = await res.json();
  return data.map(c => ({
    number:   c.number,
    name:     c.name,
    stars:    c.stars,
    patch:    c.patch,
    icon:     c.icon,
    image:    `https://ffxivcollect.com/images/cards/large/${c.image_id || c.number}.png`,
    sources:  c.sources || [],
    stats:    c.stats || {},
  }));
}

// =====================
// フィルター操作
// =====================
function setView(btn, val) {
  currentView = val;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function toggleType(btn, type) {
  if (activeTypes.has(type)) {
    activeTypes.delete(type);
    btn.classList.remove('active');
  } else {
    activeTypes.add(type);
    btn.classList.add('active');
  }
  renderCards();
}

// =====================
// 統計更新
// =====================
function updateStats() {
  let cnt = 0;
  for (let i = 1; i <= TOTAL; i++) if (owned[i]) cnt++;
  document.getElementById('stat-owned').textContent   = cnt;
  document.getElementById('stat-missing').textContent = TOTAL - cnt;
  const pct = Math.floor(cnt / TOTAL * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-left').textContent = TOTAL - cnt;
}

// =====================
// カードレンダリング
// =====================
function renderCards() {
  const app    = document.getElementById('app');
  const search = document.getElementById('search').value.trim().toLowerCase();

  // フィルター
  const filtered = allCards.filter(card => {
    const num = card.number;
    if (num < 1 || num > TOTAL) return false;

    // 未所持キープ（viewに関係なく未所持を基本とする）
    if (currentView === 'missing' && owned[num]) return false;
    if (currentView === 'owned'   && !owned[num]) return false;

    // typeフィルター（OR）
    if (activeTypes.size > 0) {
      const cardTypes = card.sources.map(s => s.type);
      if (!cardTypes.some(t => activeTypes.has(t))) return false;
    }

    // 検索
    if (search && !card.name.toLowerCase().includes(search) && !String(num).includes(search)) return false;

    return true;
  });

  // グループ化
  const groupMap = {};
  GROUPS.forEach(g => groupMap[g.key] = []);
  filtered.forEach(card => {
    const key = getGroupKey(card);
    groupMap[key].push(card);
  });

  let html = '';
  GROUPS.forEach(g => {
    const cards = groupMap[g.key];
    if (!cards || cards.length === 0) return;
    const ownedCnt = cards.filter(c => owned[c.number]).length;

    html += `<div class="group">
      <div class="group-header">
        <div class="group-dot" style="background:${g.color}"></div>
        <div class="group-name" style="color:${g.color}">${g.label}</div>
        <div class="group-owned" style="color:${g.color}">${ownedCnt} / ${cards.length}</div>
      </div>
      <div class="card-list">`;

    cards.forEach(card => {
      const num     = card.number;
      const isOwned = owned[num];
      const starsHtml = '★'.repeat(card.stars || 1) + '☆'.repeat(Math.max(0, 5 - (card.stars || 1)));

      // sourcesバッジ（全件・日本語type）
      const srcHtml = card.sources.map(s => {
        const cls  = typeCls(s.type);
        const ja   = TYPE_JA[s.type] || s.type;
        const text = s.text ? escHtml(s.text) : '';
        return `<span class="src-badge ${cls}"><span class="src-type-label">${ja}</span>${text ? '：' + text : ''}</span>`;
      }).join('');

      html += `<div class="card-item${isOwned ? ' checked' : ''}" data-num="${num}">
        <div class="card-check" onclick="toggleCard(event,${num})"></div>
        <div class="card-icon-wrap">
          <img src="${escHtml(card.icon)}" alt="${escHtml(card.name)}" loading="lazy" onerror="this.style.opacity='0.3'">
        </div>
        <div>
          <div class="card-no">No.${String(num).padStart(3,'0')}</div>
          <div class="card-meta"><span class="card-stars">${starsHtml}</span> <span>p${escHtml(card.patch||'')}</span></div>
        </div>
        <div class="card-name">${escHtml(card.name)}</div>
        <div class="card-sources">${srcHtml}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!html) {
    html = '<div style="text-align:center;padding:60px;color:var(--text3);">該当するカードがありません</div>';
  }
  app.innerHTML = html;
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================
// チェック（チェックボックスのみ）
// =====================
function toggleCard(e, num) {
  e.stopPropagation();
  owned[num] = !owned[num];
  updateUrl();
  updateStats();
  const el = document.querySelector(`.card-item[data-num="${num}"]`);
  if (el) {
    el.classList.toggle('checked', owned[num]);
  }
  // 未所持フィルター中はチェックした行を非表示
  if (currentView === 'missing' && owned[num] && el) el.style.display = 'none';
  if (currentView === 'owned' && !owned[num] && el) el.style.display = 'none';
}

// =====================
// URLコピー
// =====================
function copyUrl() {
  const url = location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('URLをコピーしました'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('URLをコピーしました');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// =====================
// 初期化
// =====================
async function init() {
  const hash = location.hash.slice(1);
  if (hash.length === TOTAL && /^[01]+$/.test(hash)) ownedFromHash(hash);

  try {
    const cards = await fetchCards();
    // No.1〜312 を number順にソート（No.1が先頭に来るよう明示）
    allCards = cards
      .filter(c => c.number >= 1 && c.number <= TOTAL)
      .sort((a, b) => a.number - b.number);

    if (allCards.length === 0) throw new Error('no cards');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    updateStats();
    renderCards();

    if (hash.length === TOTAL) {
      document.getElementById('share-url').textContent = location.href;
    }
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    console.error(e);
  }
}

init();
</script>
